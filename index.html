<!DOCTYPE html>
<html>
<head>
    <title>⚔️ ПТДАДТА-БОЙНЯ ⚔️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a0a, #1a0f2e); 
            color: white; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .консоль {
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 4em;
            color: gold;
            text-shadow: 0 0 20px gold;
        }
        .статистика {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }
        .стат-блок {
            text-align: center;
        }
        .значение {
            font-size: 3em;
            color: gold;
        }
        #output {
            background: #111;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 30px;
            min-height: 400px;
            font-size: 24px;
            margin-bottom: 30px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 20px;
        }
        #userInput {
            flex: 1;
            padding: 20px;
            font-size: 24px;
            background: #222;
            color: white;
            border: 2px solid gold;
            border-radius: 10px;
        }
        button {
            padding: 20px 40px;
            font-size: 24px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        .регистрация {
            background: #222;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .регистр-статус {
            color: gold;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .регистрация input {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid gold;
            border-radius: 5px;
        }
        .регистрация button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="консоль">
        <h1>⚔️ ПТДАДТА-БОЙНЯ ⚔️</h1>
        
        <div class="регистрация">
            <div class="регистр-статус" id="регистр-статус">🔓 ГОСТЬ</div>
            <input type="text" id="регистр-логин" placeholder="Логин">
            <input type="password" id="регистр-пароль" placeholder="Пароль">
            <br>
            <button onclick="регистрация()">📝 РЕГИСТРАЦИЯ</button>
            <button onclick="войти()">🔑 ВХОД</button>
            <button onclick="выйти()">🚪 ВЫХОД</button>
        </div>
        
        <div class="статистика">
            <div class="стат-блок">
                <div class="значение" id="жизни">5</div>
                <div>❤️ ЖИЗНИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="очки">0</div>
                <div>📊 ОЧКИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="подрезы">0</div>
                <div>🔪 ПОДРЕЗЫ</div>
            </div>
        </div>

        <div id="output">🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Введи 1, 2, 3 или 4..." autofocus>
            <button onclick="обработатьВвод()">➡️ ВВОД</button>
        </div>
    </div>

    <script>
        let текущийПользователь = null;
        let пользователи = JSON.parse(localStorage.getItem("пользователи")) || {};
        
        let очки = 0;
        let жизни = 5;
        let подрезы = 0;
        let состояние = "главное_меню";
        let текущийПредмет = "";
        let текущаяКатегория = "";
        
        let вБою = false;
        let раунд = 1;
        let победыИгрока = 0;
        let победыПротивника = 0;
        let текущийВопрос = null;
        let правильныйОтвет = 0;
        let таймерРаунда = null;
        let сложностьБоя = "легко";
        let текущийПротивник = "";
        let противникЭмодзи = "";

        let достижения = {
            дед: false,
            ильяс: false,
            олег: false,
            автокран: false,
            ёж: false,
            мент: false,
            центурион: false
        };

        let сбитоАвтокранов = 0;
        let сбитоЕжей = 0;
        let сбитоМентов = 0;
        let всегоСбито = 0;

        const слова = {
            "легковушка": ["жигули", "бэха", "приора", "тазик", "мерс"],
            "животные": ["заяц", "медведь", "лось", "кабан", "ёж", "белка"],
            "препятствия": ["столб", "забор", "яма", "камень", "дерево"],
            "транспорт": ["трактор", "автобус", "фура", "пожарка", "скорая", "мент", "автокран"],
            "бомжи": ["бомж с вокзала", "бомжиха с тележкой", "бомж-алкоголик"],
            "алкаши": ["алкаш с пузырём", "алкаш под забором", "пьяный сантехник"],
            "бабки": ["бабка с авоськой", "бабка с семечками", "бабка-сплетница"],
            "деды": ["дед с яйцом", "дед с клюшкой", "дед на лавочке"],
            "гопники": ["гопник с района", "гопник с семками", "гопник с битой"],
            "мутанты": ["радиоактивный ёж", "трёхглазый заяц", "лось с рентгеном"]
        };

        const вопросы = [
            {вопрос: "2 + 2 = ?", варианты: ["1. 3", "2. 4", "3. 5"], правильный: 2},
            {вопрос: "Столица России?", варианты: ["1. Москва", "2. Питер", "3. Новосибирск"], правильный: 1},
            {вопрос: "Сколько дней в неделе?", варианты: ["1. 5", "2. 6", "3. 7"], правильный: 3},
            {вопрос: "Кто сказал 'ПТДАДТА ВЕЧНА'?", варианты: ["1. Игорь", "2. Ильяс", "3. Олег"], правильный: 1}
        ];

        function обновитьСтатусРегистрации() {
            let статус = document.getElementById("регистр-статус");
            статус.innerHTML = текущийПользователь ? `🔒 ПОЛЬЗОВАТЕЛЬ: ${текущийПользователь}` : "🔓 ГОСТЬ";
        }

        function регистрация() {
            let логин = document.getElementById("регистр-логин").value.trim();
            let пароль = document.getElementById("регистр-пароль").value.trim();
            
            if (!логин || !пароль) {
                alert("Введи логин и пароль!");
                return;
            }
            
            if (пользователи[логин]) {
                alert("Такой пользователь уже есть!");
                return;
            }
            
            пользователи[логин] = {
                пароль: пароль,
                очки: 0, жизни: 5, подрезы: 0,
                достижения: {дед: false, ильяс: false, олег: false, автокран: false, ёж: false, мент: false, центурион: false},
                сбитоАвтокранов: 0, сбитоЕжей: 0, сбитоМентов: 0, всегоСбито: 0
            };
            
            localStorage.setItem("пользователи", JSON.stringify(пользователи));
            alert("Регистрация успешна! Теперь войди.");
        }

        function войти() {
            let логин = document.getElementById("регистр-логин").value.trim();
            let пароль = document.getElementById("регистр-пароль").value.trim();
            
            if (!логин || !пароль) {
                alert("Введи логин и пароль!");
                return;
            }
            
            let пользователь = пользователи[логин];
            if (!пользователь || пользователь.пароль !== пароль) {
                alert("Неверный логин или пароль!");
                return;
            }
            
            текущийПользователь = логин;
            очки = пользователь.очки || 0;
            жизни = пользователь.жизни || 5;
            подрезы = пользователь.подрезы || 0;
            достижения = пользователь.достижения || {дед: false, ильяс: false, олег: false, автокран: false, ёж: false, мент: false, центурион: false};
            сбитоАвтокранов = пользователь.сбитоАвтокранов || 0;
            сбитоЕжей = пользователь.сбитоЕжей || 0;
            сбитоМентов = пользователь.сбитоМентов || 0;
            всегоСбито = пользователь.всегоСбито || 0;
            
            обновитьСтатистику();
            обновитьСтатусРегистрации();
            добавитьТекст(`🔑 Добро пожаловать, ${логин}!`);
            новаяВстреча();
        }

        function выйти() {
            if (текущийПользователь) {
                пользователи[текущийПользователь].очки = очки;
                пользователи[текущийПользователь].жизни = жизни;
                пользователи[текущийПользователь].подрезы = подрезы;
                пользователи[текущийПользователь].достижения = достижения;
                пользователи[текущийПользователь].сбитоАвтокранов = сбитоАвтокранов;
                пользователи[текущийПользователь].сбитоЕжей = сбитоЕжей;
                пользователи[текущийПользователь].сбитоМентов = сбитоМентов;
                пользователи[текущийПользователь].всегоСбито = всегоСбито;
                localStorage.setItem("пользователи", JSON.stringify(пользователи));
            }
            
            текущийПользователь = null;
            очки = 0; жизни = 5; подрезы = 0;
            достижения = {дед: false, ильяс: false, олег: false, автокран: false, ёж: false, мент: false, центурион: false};
            сбитоАвтокранов = 0; сбитоЕжей = 0; сбитоМентов = 0; всегоСбито = 0;
            
            обновитьСтатистику();
            обновитьСтатусРегистрации();
            добавитьТекст("👋 Ты вышел. Теперь ты гость.");
            новаяВстреча();
        }

        function обновитьСтатистику() {
            document.getElementById("жизни").innerText = жизни;
            document.getElementById("очки").innerText = очки;
            document.getElementById("подрезы").innerText = подрезы;
        }

        function добавитьТекст(текст) {
            let output = document.getElementById("output");
            output.innerHTML = текст + "<br>" + output.innerHTML;
        }

        function очиститьВывод() {
            document.getElementById("output").innerHTML = "🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛";
        }

        function показатьМеню() {
            добавитьТекст("\n=================");
            добавитьТекст("🚗 Что делать?");
            добавитьТекст("1. 💥 СБИТЬ");
            добавитьТекст("2. 🤝 ПОЩАДИТЬ");
            добавитьТекст("3. ⚔️ БОЙНЯ");
            добавитьТекст("4. 📊 СТАТИСТИКА");
            состояние = "главное_меню";
        }

        function новаяВстреча() {
            let категории = Object.keys(слова);
            let категория = категории[Math.floor(Math.random() * категории.length)];
            let предмет = слова[категория][Math.floor(Math.random() * слова[категория].length)];
            текущийПредмет = предмет;
            текущаяКатегория = категория;
            добавитьТекст(`\n🚗 Ты едешь по трассе и видишь ${предмет} (${категория}).`);
            показатьМеню();
        }

        function получитьСлучайныйВопрос() {
            return вопросы[Math.floor(Math.random() * вопросы.length)];
        }

        function обработатьВвод() {
            let input = document.getElementById("userInput").value.trim();
            document.getElementById("userInput").value = "";
            
            if (input === "") return;
            добавитьТекст("> " + input);
            
            if (состояние === "главное_меню") {
                switch(input) {
                    case "1":
                        let вопрос = получитьСлучайныйВопрос();
                        текущийВопрос = вопрос;
                        правильныйОтвет = вопрос.правильный;
                        добавитьТекст(`\n❓ ${вопрос.вопрос}`);
                        вопрос.варианты.forEach(в => добавитьТекст(в));
                        добавитьТекст(`👉 Введи номер ответа (1, 2 или 3):`);
                        состояние = "ожидание_ответа_сбить";
                        break;
                        
                    case "2":
                        добавитьТекст("😇 Пощадил +1 очко");
                        очки++;
                        обновитьСтатистику();
                        if (текущийПользователь) сохранитьПрогресс();
                        новаяВстреча();
                        break;
                        
                    case "4":
                        добавитьТекст(`\n📊 СТАТИСТИКА:
❤️ Жизни: ${жизни}
📊 Очки: ${очки}
🔪 Подрезы: ${подрезы}
📈 Всего сбито: ${всегоСбито}`);
                        setTimeout(() => новаяВстреча(), 3000);
                        break;
                        
                    default:
                        добавитьТекст("❌ Неправильный выбор");
                        setTimeout(показатьМеню, 1000);
                }
            }
            else if (состояние === "ожидание_ответа_сбить") {
                let ответ = parseInt(input);
                if (ответ === правильныйОтвет) {
                    добавитьТекст("✅ Верно! +3 очка, +1 подрез");
                    очки += 3;
                    подрезы++;
                    всегоСбито++;
                    
                    if (текущийПредмет === "автокран") сбитоАвтокранов++;
                    if (текущийПредмет === "ёж" || текущийПредмет === "радиоактивный ёж") сбитоЕжей++;
                    if (текущийПредмет === "мент") сбитоМентов++;
                } else {
                    добавитьТекст(`❌ Ошибка! -2 жизни`);
                    жизни -= 2;
                }
                
                обновитьСтатистику();
                if (текущийПользователь) сохранитьПрогресс();
                
                if (жизни <= 0) {
                    добавитьТекст("\n💀 ТЫ УМЕР 💀");
                    жизни = 5; очки = 0; подрезы = 0;
                    сбитоАвтокранов = 0; сбитоЕжей = 0; сбитоМентов = 0; всегоСбито = 0;
                    if (текущийПользователь) сохранитьПрогресс();
                }
                
                setTimeout(новаяВстреча, 2000);
            }
        }
                function сохранитьПрогресс() {
            if (текущийПользователь) {
                пользователи[текущийПользователь].очки = очки;
                пользователи[текущийПользователь].жизни = жизни;
                пользователи[текущийПользователь].подрезы = подрезы;
                пользователи[текущийПользователь].достижения = достижения;
                пользователи[текущийПользователь].сбитоАвтокранов = сбитоАвтокранов;
                пользователи[текущийПользователь].сбитоЕжей = сбитоЕжей;
                пользователи[текущийПользователь].сбитоМентов = сбитоМентов;
                пользователи[текущийПользователь].всегоСбито = всегоСбито;
                localStorage.setItem("пользователи", JSON.stringify(пользователи));
            }
        }

        window.onload = function() {
            новаяВстреча();
            обновитьСтатусРегистрации();
        };
    </script>
</body>
</html>
