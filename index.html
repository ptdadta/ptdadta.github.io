<!DOCTYPE html>
<html>
<head>
    <title>ПТДАДТА-ИГРА</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(45deg, #000, #1a0033); 
            color: white; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .консоль {
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 3em;
            text-shadow: 0 0 20px gold;
            margin-bottom: 30px;
        }
        #output {
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            font-size: 18px;
            margin-bottom: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            background: #222;
            color: white;
            border: 2px solid gold;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        .статистика {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }
        .стат-блок {
            text-align: center;
        }
        .значение {
            font-size: 2em;
            color: gold;
        }
    </style>
</head>
<body>
    <div class="консоль">
        <h1>⚔️ ПТДАДТА-БОЙНЯ ⚔️</h1>
        
        <div class="статистика">
            <div class="стат-блок">
                <div class="значение" id="жизни">5</div>
                <div>❤️ ЖИЗНИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="очки">0</div>
                <div>📊 ОЧКИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="подрезы">0</div>
                <div>🔪 ПОДРЕЗАНО</div>
            </div>
        </div>

        <div id="output">🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твой выбор..." autofocus>
            <button onclick="обработатьВвод()">➡️ ВВОД</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let очки = 0;
        let жизни = 5;
        let подрезы = 0;
        let состояние = "главное_меню";
        let текущийПредмет = "";
        let текущаяКатегория = "";
        
        const слова = {
            "легковушка": ["жигули", "бэха", "приора", "тазик", "мерс", "жид"],
            "животные": ["заяц", "медведь", "лось", "кабан", "ёж", "белка", "енот"],
            "препятствия": ["столб", "забор", "яма", "камень", "дерево", "мужик с пивом"],
            "транспорт": ["трактор", "автобус", "фура", "пожарка", "скорая", "мент"]
        };

        // ========== ФУНКЦИИ ==========
        function обновитьСтатистику() {
            document.getElementById("жизни").innerText = жизни;
            document.getElementById("очки").innerText = очки;
            document.getElementById("подрезы").innerText = подрезы;
        }

        function добавитьТекст(текст) {
            let output = document.getElementById("output");
            output.innerHTML += "<br>" + текст;
            output.scrollTop = output.scrollHeight;
        }

        function показатьМеню() {
            добавитьТекст("\n=================");
            добавитьТекст("🚗 Что делать?");
            добавитьТекст("1. 💥 СБИТЬ");
            добавитьТекст("2. 🤝 ПОЩАДИТЬ");
            добавитьТекст("3. ⚔️ БОЙНЯ (до 3 побед)");
            добавитьТекст("4. 📊 СТАТИСТИКА");
            состояние = "главное_меню";
        }

        function новаяВстреча() {
            let категории = Object.keys(слова);
            let категория = категории[Math.floor(Math.random() * категории.length)];
            let предмет = слова[категория][Math.floor(Math.random() * слова[категория].length)];
            текущийПредмет = предмет;
            текущаяКатегория = категория;
            
            добавитьТекст(`\n🚗 Ты едешь по трассе и видишь ${предмет} (${категория}).`);
            показатьМеню();
        }

        function задачаСТаймером(категория, действие) {
            let сложность = категория === "легковушка" ? "легко" : 
                            категория === "транспорт" ? "средне" : "сложно";
            let a = Math.floor(Math.random() * 10) + 1;
            let b = Math.floor(Math.random() * 10) + 1;
            let правильный;
            let текст;
            
            if (сложность === "легко") {
                if (Math.random() > 0.5) {
                    текст = `${a} + ${b}`;
                    правильный = a + b;
                } else {
                    a = Math.max(a, b);
                    текст = `${a} - ${b}`;
                    правильный = a - b;
                }
            } else if (сложность === "средне") {
                a = Math.floor(Math.random() * 5) + 2;
                b = Math.floor(Math.random() * 5) + 2;
                текст = `${a} × ${b}`;
                правильный = a * b;
            } else {
                a = Math.floor(Math.random() * 5) + 3;
                b = Math.floor(Math.random() * 5) + 3;
                let c = Math.floor(Math.random() * 2) + 2;
                текст = `(${a} + ${b}) × ${c}`;
                правильный = (a + b) * c;
            }
            
            добавитьТекст(`\n${текст} = ?`);
            
            let ответ = prompt(текст + " = ? (у тебя 10 секунд)");
            
            if (ответ === null) {
                добавитьТекст("⏰ Ты не ответил!");
                if (действие === "сбить") {
                    добавитьТекст("🚗💨 Тебя обогнали! -1 жизнь");
                    жизни--;
                }
            } else if (parseInt(ответ) === правильный) {
                добавитьТекст("✅ Верно!");
                if (действие === "сбить") {
                    добавитьТекст(`💥 Ты подрезал ${текущийПредмет}! +3 очка`);
                    очки += 3;
                    подрезы++;
                } else if (действие === "пощадить") {
                    очки += 1;
                }
            } else {
                добавитьТекст("❌ Ошибка!");
                if (действие === "сбить") {
                    добавитьТекст(`🧱 Ты врезался! -2 жизни`);
                    жизни -= 2;
                }
            }
            обновитьСтатистику();
            новаяВстреча();
        }

        // ========== ОСНОВНАЯ ФУНКЦИЯ ==========
        function обработатьВвод() {
            let input = document.getElementById("userInput").value.trim();
            document.getElementById("userInput").value = "";
            
            if (input === "") return;
            
            добавитьТекст("> " + input);
            
            if (состояние === "главное_меню") {
                switch(input) {
                    case "1":
                        задачаСТаймером(текущаяКатегория, "сбить");
                        break;
                    case "2":
                        задачаСТаймером(текущаяКатегория, "пощадить");
                        break;
                    case "3":
                        добавитьТекст("⚔️ БОЙНЯ ПОКА НЕ ДОДЕЛАНА, НО БУДЕТ!");
                        setTimeout(новаяВстреча, 2000);
                        break;
                    case "4":
                        добавитьТекст(`\n📊 СТАТИСТИКА:`);
                        добавитьТекст(`❤️ ЖИЗНИ: ${жизни}`);
                        добавитьТекст(`📊 ОЧКИ: ${очки}`);
                        добавитьТекст(`🔪 ПОДРЕЗАНО: ${подрезы}`);
                        setTimeout(показатьМеню, 2000);
                        break;
                    default:
                        добавитьТекст("❌ Неправильный выбор");
                        setTimeout(показатьМеню, 1000);
                }
            }
            
            if (жизни <= 0) {
                добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                добавитьТекст(`ИТОГО: ${очки} очков, ${подрезы} подрезаний`);
                добавитьТекст("🕊️ ПТДАДТА ВЕЧНА 🕊️");
            }
            
            обновитьСтатистику();
        }

        // ========== СТАРТ ==========
        window.onload = function() {
            новаяВстреча();
        };
    </script>
</body>
</html>
