<!DOCTYPE html>
<html>
<head>
    <title>⚔️ ПТДАДТА-БОЙНЯ ⚔️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(45deg, #000, #1a0033); 
            color: white; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            font-size: 18px;
        }
        .консоль {
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 4em;
            text-shadow: 0 0 20px gold;
            margin-bottom: 30px;
        }
        .журнал {
            background: #222;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #ffaa00;
            display: flex;
            justify-content: space-between;
        }
        #output {
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 30px;
            min-height: 400px;
            font-size: 24px;
            margin-bottom: 30px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            line-height: 1.5;
        }
        .input-area {
            display: flex;
            gap: 20px;
        }
        #userInput {
            flex: 1;
            padding: 20px;
            font-size: 24px;
            background: #222;
            color: white;
            border: 2px solid gold;
            border-radius: 10px;
        }
        button {
            padding: 20px 40px;
            font-size: 24px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        .статистика {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }
        .стат-блок {
            text-align: center;
        }
        .значение {
            font-size: 3em;
            color: gold;
        }
        .стат-блок div:last-child {
            font-size: 20px;
        }
        .версия {
            color: #ffaa00;
            font-size: 14px;
            text-align: right;
        }
        .ачивки {
            background: #222;
            border: 2px solid gold;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .ачивка {
            background: #333;
            border: 1px solid #ffaa00;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 16px;
            color: #aaa;
            transition: 0.3s;
            opacity: 0.5;
        }
        .ачивка.получена {
            border-color: gold;
            color: gold;
            opacity: 1;
            box-shadow: 0 0 15px gold;
            background: #444;
        }
    </style>
</head>
<body>
    <div class="консоль">
        <h1>⚔️ ПТДАДТА-БОЙНЯ ⚔️</h1>
        
        <div class="журнал" id="журнал">
            <span id="журнал-текст">📋 ПОСЛЕДНИЕ ОБНОВЛЕНИЯ: ТЕПЕРЬ ВОПРОСЫ А НЕ ПРИМЕРЫ</span>
            <span class="версия">v4.0</span>
        </div>
        
        <div class="статистика">
            <div class="стат-блок">
                <div class="значение" id="жизни">5</div>
                <div>❤️ ЖИЗНИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="очки">0</div>
                <div>📊 ОЧКИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="подрезы">0</div>
                <div>🔪 ПОДРЕЗАНО</div>
            </div>
        </div>

        <div id="output">🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Введи 1, 2, 3 или 4..." autofocus>
            <button onclick="обработатьВвод()">➡️ ВВОД</button>
        </div>

        <div class="ачивки" id="ачивки-контейнер">
            <div class="ачивка" id="ачивка-дед">🏆 Победитель деда</div>
            <div class="ачивка" id="ачивка-ильяс">👑 Покоритель Ильяса</div>
            <div class="ачивка" id="ачивка-олег">⚡ Укротитель Олега</div>
            <div class="ачивка" id="ачивка-автокран">🏗️ Охотник на автокраны</div>
            <div class="ачивка" id="ачивка-ёж">🦔 Друг ежей</div>
            <div class="ачивка" id="ачивка-мент">👮 Бунтарь</div>
            <div class="ачивка" id="ачивка-100">💯 Центурион</div>
        </div>
    </div>

    <script>
        let очки = 0;
        let жизни = 5;
        let подрезы = 0;
        let состояние = "главное_меню";
        let текущийПредмет = "";
        let текущаяКатегория = "";
        
        let вБою = false;
        let раунд = 1;
        let победыИгрока = 0;
        let победыПротивника = 0;
        let текущийВопрос = null;
        let правильныйОтвет = 0;
        let таймерРаунда = null;
        let сложностьБоя = "легко";
        let текущийПротивник = "";
        let противникЭмодзи = "";

        let достижения = {
            дед: false,
            ильяс: false,
            олег: false,
            автокран: false,
            ёж: false,
            мент: false,
            центурион: false
        };

        let сбитоАвтокранов = 0;
        let сбитоЕжей = 0;
        let сбитоМентов = 0;
        let всегоСбито = 0;

        const противники = [
            {имя: "Бабка", эмодзи: "👵", скорость: 3, фразы: ["Бабуля ещё ого-го!", "Я на пенсии, но не лох!"]},
            {имя: "Дед", эмодзи: "🧓", скорость: 4, фразы: ["Я ещё покурю!", "Ветеран, бля!"]},
            {имя: "Зинаида", эмодзи: "👩‍🏫", скорость: 5, фразы: ["Я тебе устрою!", "Ключи отберу!"]},
            {имя: "Алкаш", эмодзи: "🍺", скорость: 2, фразы: ["Дай опохмелиться!", "Ща догоню!"]},
            {имя: "Гопник", эмодзи: "🧢", скорость: 6, фразы: ["Э, ты чё, брат?", "Слышь, тормозни!"]},
            {имя: "Мент", эмодзи: "👮", скорость: 7, фразы: ["Права покажи!", "Стоять, бля!"]},
            {имя: "Дальнобой", эмодзи: "🚛", скорость: 5, фразы: ["Сигналю, бля!", "Куда прёшь?!"]},
            {имя: "Ёж", эмодзи: "🦔", скорость: 1, фразы: ["Фыр-фыр!", "Колючий, сука!"]},
            {имя: "Ильяс", эмодзи: "👨‍🌾", скорость: 9, фразы: ["Я Ильяс, бля!", "Сейчас догоню на тракторе!", "Ау, брат, тормози!"]},
            {имя: "Олег", эмодзи: "👨‍🔧", скорость: 8, фразы: ["Олег не прощает!", "Ты чё, Олега не уважаешь?", "Ща как дам гаечным ключом!"]}
        ];

        const слова = {
            "легковушка": ["жигули", "бэха", "приора", "тазик", "мерс"],
            "животные": ["заяц", "медведь", "лось", "кабан", "ёж", "белка"],
            "препятствия": ["столб", "забор", "яма", "камень", "дерево"],
            "транспорт": ["трактор", "автобус", "фура", "пожарка", "скорая", "мент", "автокран"],
            "бомжи": ["бомж с вокзала", "бомжиха с тележкой", "бомж-алкоголик"],
            "алкаши": ["алкаш с пузырём", "алкаш под забором", "пьяный сантехник"],
            "зинаиды": ["зинаида с ключами", "зинаида-вахтёрша", "зинаида-училка"],
            "деды": ["дед с яйцом", "дед с клюшкой", "дед на лавочке"],
            "бабки": ["бабка с авоськой", "бабка с семечками", "бабка-сплетница"],
            "гопники": ["гопник с района", "гопник с семками", "гопник с битой"],
            "таджики": ["таджик с метлой", "таджик-строитель", "таджик с шаурмой"],
            "чиновники": ["чиновник с портфелем", "депутат на мерсе", "мэр города"],
            "пассажиры": ["бабка с билетом", "заяц в автобусе", "кондукторша злая"],
            "маршрутчики": ["маршрутчик-лихач", "маршрутчик-хам", "маршрутчик с деньгами"],
            "пешеходы": ["пешеход с телефоном", "пешеход на красный", "пешеход с наушниками"],
            "мутанты": ["трёхглазый заяц", "радиоактивный ёж", "лось с рентгеном"]
        };

        const вопросы = [
            {
                вопрос: "Сколько будет 2 + 2?",
                варианты: ["1. 3", "2. 4", "3. 5"],
                правильный: 2
            },
            {
                вопрос: "Какого цвета нет в радуге?",
                варианты: ["1. Красный", "2. Коричневый", "3. Синий"],
                правильный: 2
            },
            {
                вопрос: "Столица России?",
                варианты: ["1. Москва", "2. Питер", "3. Новосибирск"],
                правильный: 1
            },
            {
                вопрос: "Сколько дней в неделе?",
                варианты: ["1. 5", "2. 6", "3. 7"],
                правильный: 3
            },
            {
                вопрос: "Кто сказал 'ПТДАДТА ВЕЧНА'?",
                варианты: ["1. Игорь", "2. Ильяс", "3. Олег"],
                правильный: 1
            },
            {
                вопрос: "Что лучше всего сбивать в ETS2?",
                варианты: ["1. Легковушки", "2. Бабушек", "3. Автокраны"],
                правильный: 3
            },
            {
                вопрос: "Какая скорость у пули + рыбы-ежа + пердежа?",
                варианты: ["1. 911.3 м/с", "2. 1000 м/с", "3. 500 м/с"],
                правильный: 1
            },
            {
                вопрос: "Кто такой Ильяс?",
                варианты: ["1. Дальнобойщик", "2. Легендарный противник", "3. Алкаш"],
                правильный: 2
            }
        ];

        const фразы = {
            "легковушка": {
                сбить: ["💥 ХАХАХАХАХ, СЪЕБАЛАСЬ НИЩАЯ!", "🚗💨 БЭХА УЛЕТЕЛА В ЗАБОР!", "😈 ЖИГУЛИ РАЗЪЕБАЛ В ХЛАМ!"],
                пощадить: ["😇 Ладно, живи, тварь...", "🤝 Сегодня ты добрый.", "🕊️ Отпустил."],
                объехать: ["🏁 Объехал, красава!", "🚀 Пролетел мимо."]
            },
            "животные": {
                сбить: ["💀 Заяц теперь не ужин, а хуй знает что.", "🦌 Лось — труп, нахуй он нужен?", "🦔 Ёж размазался по асфальту, сука."],
                пощадить: ["🦊 Белка ускакала в лес, повезло, суке.", "🐾 Ты добрый, животное выжило."],
                объехать: ["🏃 Заяц убежал, быстро съебал.", "🦔 Ёжик остался жив, хуй с ним."]
            },
            "препятствия": {
                сбить: ["🧱 Забор нахуй!", "🚧 Столб — в щепки!", "💢 Камень разлетелся, сука!"],
                пощадить: ["🙏 Обошёл, не стал ломать.", "🛣️ Препятствие на месте, а ты молодец."],
                объехать: ["🏎️ Красивый объезд, бля!", "🎯 Как Шумахер, сука!"]
            },
            "транспорт": {
                сбить: ["🚌 АХАХАХАХА, ВЫ ЧЁ АХУЕЛИ, БАБКИ? ВРЕМЯ 6 УТРА, НАХУЙ!", "🚛 ДАЛЬНОБОЙ ПЕРЕВЕРНУЛСЯ!", "👮 МЕНТ В КЮВЕТЕ!", "🏗️ АВТОКРАН РУХНУЛ, БЛЯ!"],
                пощадить: ["👨‍⚕️ Скорая уехала.", "👮 Мент козырнул."],
                объехать: ["🚚 Фуру объехал!", "🏎️ Автобус позади!"]
            }
        };

        const обновления = [
            "⚡ v4.0 — ТЕПЕРЬ ВОПРОСЫ А НЕ ПРИМЕРЫ!",
            "❓ Отвечай на вопросы цифрой 1, 2 или 3",
            "👑 Ильяс и Олег всё ещё в бойне",
            "🦔 Сбей ежа или автокран — получи ачивку",
            "💯 Сбей 100 объектов — стань центурионом"
        ];

        let индексОбновления = 0;

        function показатьОбновление() {
            let журналТекст = document.getElementById("журнал-текст");
            if (журналТекст) {
                журналТекст.innerText = "📋 ПОСЛЕДНИЕ ОБНОВЛЕНИЯ: " + обновления[индексОбновления];
                индексОбновления = (индексОбновления + 1) % обновления.length;
            }
        }

        setInterval(показатьОбновление, 5000);

        function обновитьСтатистику() {
            document.getElementById("жизни").innerText = жизни;
            document.getElementById("очки").innerText = очки;
            document.getElementById("подрезы").innerText = подрезы;
        }

        function обновитьАчивки() {
            if (достижения.дед) document.getElementById("ачивка-дед").classList.add("получена");
            if (достижения.ильяс) document.getElementById("ачивка-ильяс").classList.add("получена");
            if (достижения.олег) document.getElementById("ачивка-олег").classList.add("получена");
            if (достижения.автокран) document.getElementById("ачивка-автокран").classList.add("получена");
            if (достижения.ёж) document.getElementById("ачивка-ёж").classList.add("получена");
            if (достижения.мент) document.getElementById("ачивка-мент").classList.add("получена");
            if (достижения.центурион) document.getElementById("ачивка-100").classList.add("получена");
        }

        function проверитьДостижения() {
            if (текущийПротивник === "Дед" && победыИгрока >= 3 && !достижения.дед) {
                достижения.дед = true;
                добавитьТекст("🏆 ПОЛУЧЕНО ДОСТИЖЕНИЕ: Победитель деда!");
            }
            if (текущийПротивник === "Ильяс" && победыИгрока >= 3 && !достижения.ильяс) {
                достижения.ильяс = true;
                добавитьТекст("👑 ПОЛУЧЕНО ДОСТИЖЕНИЕ: Покоритель Ильяса!");
            }
            if (текущийПротивник === "Олег" && победыИгрока >= 3 && !достижения.олег) {
                достижения.олег = true;
                добавитьТекст("⚡ ПОЛУЧЕНО ДОСТИЖЕНИЕ: Укротитель Олега!");
            }
            if (сбитоАвтокранов >= 3 && !достижения.автокран) {
                достижения.автокран = true;
                добавитьТекст("🏗️ ПОЛУЧЕНО ДОСТИЖЕНИЕ: Охотник на автокраны!");
            }
            if (сбитоЕжей >= 5 && !достижения.ёж) {
                достижения.ёж = true;
                добавитьТекст("🦔 ПОЛУЧЕНО ДОСТИЖЕНИЕ: Друг ежей!");
            }
            if (сбитоМентов >= 10 && !достижения.мент) {
                достижения.мент = true;
                добавитьТекст("👮 ПОЛУЧЕНО ДОСТИЖЕНИЕ: Бунтарь!");
            }
            if (всегоСбито >= 100 && !достижения.центурион) {
                достижения.центурион = true;
                добавитьТекст("💯 ПОЛУЧЕНО ДОСТИЖЕНИЕ: Центурион!");
            }
            обновитьАчивки();
        }

        function добавитьТекст(текст) {
            let output = document.getElementById("output");
            output.innerHTML += "<br>" + текст;
            output.scrollTop = output.scrollHeight;
        }

        function очиститьВывод() {
            document.getElementById("output").innerHTML = "";
        }

        function показатьМеню() {
            добавитьТекст("\n=================");
            добавитьТекст("🚗 Что делать?");
            добавитьТекст("1. 💥 СБИТЬ");
            добавитьТекст("2. 🤝 ПОЩАДИТЬ");
            добавитьТекст("3. ⚔️ БОЙНЯ");
            добавитьТекст("4. 📊 СТАТИСТИКА");
            состояние = "главное_меню";
        }

        function новаяВстреча() {
            let категории = Object.keys(слова);
            let категория = категории[Math.floor(Math.random() * категории.length)];
            let предмет = слова[категория][Math.floor(Math.random() * слова[категория].length)];
            текущийПредмет = предмет;
            текущаяКатегория = категория;
            
            добавитьТекст(`\n🚗 Ты едешь по трассе и видишь ${предмет} (${категория}).`);
            показатьМеню();
        }

        function получитьФразу(категория, действие) {
            if (фразы[категория] && фразы[категория][действие]) {
                let варианты = фразы[категория][действие];
                return варианты[Math.floor(Math.random() * варианты.length)];
            }
            if (действие === "сбить") return "💥 ХУЙНЯ СБИТА!";
            if (действие === "пощадить") return "😇 ПОМИЛОВАН!";
            return "🏁 ОБЪЕХАЛ!";
        }

        function получитьСлучайныйВопрос() {
            return вопросы[Math.floor(Math.random() * вопросы.length)];
        }

        function запуститьТаймерРаунда() {
            if (таймерРаунда) clearTimeout(таймерРаунда);
            таймерРаунда = setTimeout(() => {
                if (вБою) {
                    добавитьТекст(`⏰ ВРЕМЯ ВЫШЛО! ${противникЭмодзи} ${текущийПротивник} победил!`);
                    победыПротивника++;
                    проверитьКонецБоя();
                }
            }, 15000);
        }

        function новыйРаундБоя() {
            let противник = противники[Math.floor(Math.random() * противники.length)];
            текущийПротивник = противник.имя;
            противникЭмодзи = противник.эмодзи;
            
            очиститьВывод();
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            добавитьТекст(`⚔️ РАУНД ${раунд} ⚔️`);
            добавитьТекст(`ПРОТИВНИК: ${противникЭмодзи} ${текущийПротивник}`);
            добавитьТекст(`СЧЁТ: ТЫ ${победыИгрока} : ${победыПротивника} ПРОТИВНИК`);
            добавитьТекст(противник.фразы[Math.floor(Math.random() * противник.фразы.length)]);
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            
            if (текущаяКатегория === "легковушка") сложностьБоя = "легко";
            else if (текущаяКатегория === "транспорт") сложностьБоя = "средне";
            else сложностьБоя = "сложно";
            
            let вопрос = получитьСлучайныйВопрос();
            текущийВопрос = вопрос;
            правильныйОтвет = вопрос.правильный;
            
            добавитьТекст(`\n❓ ВОПРОС БЫСТРЕЕ ${противникЭмодзи}:`);
            добавитьТекст(`📌 ${вопрос.вопрос}`);
            вопрос.варианты.forEach(вариант => добавитьТекст(вариант));
            добавитьТекст(`⏳ 15 СЕКУНД!`);
            добавитьТекст(`\n👉 Введи номер ответа (1, 2 или 3):`);
            
            состояние = "бой_раунд";
            запуститьТаймерРаунда();
        }

        function проверитьКонецБоя() {
            if (победыИгрока >= 3 || победыПротивника >= 3) {
                вБою = false;
                очиститьВывод();
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                if (победыИгрока >= 3) {
                    добавитьТекст(`🎉 ТЫ ПОБЕДИЛ ${противникЭмодзи} ${текущийПротивник}!`);
                    добавитьТекст("💥 Противник летит в забор!");
                    добавитьТекст("🏆 +10 очков, +3 подреза");
                    очки += 10;
                    подрезы += 3;

                    проверитьДостижения();
                } else {
                    добавитьТекст(`💀 ТЫ ПРОИГРАЛ ${противникЭмодзи} ${текущийПротивник}!`);
                    добавитьТекст("💔 -5 жизней");
                    жизни -= 5;
                }
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                добавитьТекст(`\n📊 ИТОГ: ${очки} очков, ${подрезы} подрезаний`);
                обновитьСтатистику();
                
                if (жизни > 0) {
                    setTimeout(новаяВстреча, 3000);
                } else {
                    добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                }
            } else {
                раунд++;
                setTimeout(новыйРаундБоя, 2000);
            }
        }

        function обработатьВвод() {
            let input = document.getElementById("userInput").value.trim();
            document.getElementById("userInput").value = "";
            
            if (input === "") return;
            
            добавитьТекст("> " + input);
            
            if (состояние === "бой_раунд") {
                if (таймерРаунда) clearTimeout(таймерРаунда);
                
                let ответ = parseInt(input);
                if (ответ === правильныйОтвет) {
                    добавитьТекст(`✅ Ты быстрее ${противникЭмодзи}!`);
                    победыИгрока++;
                } else {
                    добавитьТекст(`❌ ${противникЭмодзи} ${текущийПротивник} быстрее! Правильный ответ: ${правильныйОтвет}`);
                    победыПротивника++;
                }
                проверитьКонецБоя();
            }
            else if (состояние === "главное_меню") {
                switch(input) {
                    case "1":
                        let вопрос = получитьСлучайныйВопрос();
                        текущийВопрос = вопрос;
                        правильныйОтвет = вопрос.правильный;
                        
                        добавитьТекст(`\n❓ ОТВЕТЬ НА ВОПРОС ЧТОБЫ СБИТЬ:`);
                        добавитьТекст(`${вопрос.вопрос}`);
                        вопрос.варианты.forEach(вариант => добавитьТекст(вариант));
                        добавитьТекст(`👉 Введи номер ответа (1, 2 или 3):`);
                        
                        состояние = "ожидание_ответа_сбить";
                        break;
                        
                    case "2":
                        let фразаПощада = получитьФразу(текущаяКатегория, "пощадить");
                        добавитьТекст(`\n😇 ${фразаПощада} +1 очко`);
                        очки++;
                        if (Math.random() > 0.7) {
                            добавитьТекст("🍀 Удача! +1 очко");
                            очки++;
                        }
                        обновитьСтатистику();
                        setTimeout(новаяВстреча, 2000);
                        break;
                        
                    case "3":
                        вБою = true;
                        победыИгрока = 0;
                        победыПротивника = 0;
                        раунд = 1;
                        новыйРаундБоя();
                        break;
                        
                    case "4":
                        добавитьТекст(`\n📊 СТАТИСТИКА:`);
                        добавитьТекст(`❤️ ЖИЗНИ: ${жизни}`);
                        добавитьТекст(`📊 ОЧКИ: ${очки}`);
                        добавитьТекст(`🔪 ПОДРЕЗАНО: ${подрезы}`);
                        добавитьТекст(`🏆 ДОСТИЖЕНИЙ: ${Object.values(достижения).filter(v => v).length}/7`);
                        добавитьТекст(`📈 ВСЕГО СБИТО: ${всегоСбито}`);
                        добавитьТекст(`   - Автокранов: ${сбитоАвтокранов}`);
                        добавитьТекст(`   - Ежей: ${сбитоЕжей}`);
                        добавитьТекст(`   - Ментов: ${сбитоМентов}`);
                        setTimeout(показатьМеню, 4000);
                        break;
                        
                    default:
                        добавитьТекст("❌ Неправильный выбор. Введи 1, 2, 3 или 4");
                        setTimeout(показатьМеню, 1000);
                }
            }
            else if (состояние === "ожидание_ответа_сбить") {
                let ответ = parseInt(input);
                if (ответ === правильныйОтвет) {
                    добавитьТекст("✅ Верно!");
                    let фраза = получитьФразу(текущаяКатегория, "сбить");
                    добавитьТекст(`💥 ${фраза} +3 очка`);
                    очки += 3;
                    подрезы++;
                    
                    всегоСбито++;
                    if (текущийПредмет === "автокран") сбитоАвтокранов++;
                    if (текущийПредмет === "ёж") сбитоЕжей++;
                    if (текущийПредмет === "мент") сбитоМентов++;
                    
                    проверитьДостижения();
                } else {
                    добавитьТекст(`❌ Ошибка! Правильный ответ: ${правильныйОтвет}`);
                    добавитьТекст(`🧱 Ты врезался! -2 жизни`);
                    жизни -= 2;
                }
                обновитьСтатистику();
                setTimeout(новаяВстреча, 2000);
            }
            
            if (жизни <= 0) {
                добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                добавитьТекст(`ИТОГО: ${очки} очков, ${подрезы} подрезаний`);
                добавитьТекст("🕊️ ПТДАДТА ВЕЧНА 🕊️");
            }
            
            обновитьСтатистику();
        }

        window.onload = function() {
            новаяВстреча();
            обновитьАчивки();
        };
    </script>
</body>
</html>
