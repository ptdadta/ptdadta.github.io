<!DOCTYPE html>
<html>
<head>
    <title>ПТДАДТА-БОЙНЯ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(45deg, #000, #1a0033); 
            color: white; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .консоль {
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 3em;
            text-shadow: 0 0 20px gold;
            margin-bottom: 30px;
        }
        #output {
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            font-size: 18px;
            margin-bottom: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            background: #222;
            color: white;
            border: 2px solid gold;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        .статистика {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }
        .стат-блок {
            text-align: center;
        }
        .значение {
            font-size: 2em;
            color: gold;
        }
    </style>
</head>
<body>
    <div class="консоль">
        <h1>⚔️ ПТДАДТА-БОЙНЯ ⚔️</h1>
        
        <div class="статистика">
            <div class="стат-блок">
                <div class="значение" id="жизни">5</div>
                <div>❤️ ЖИЗНИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="очки">0</div>
                <div>📊 ОЧКИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="подрезы">0</div>
                <div>🔪 ПОДРЕЗАНО</div>
            </div>
        </div>

        <div id="output">🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твой выбор..." autofocus>
            <button onclick="обработатьВвод()">➡️ ВВОД</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let очки = 0;
        let жизни = 5;
        let подрезы = 0;
        let состояние = "главное_меню";
        let текущийПредмет = "";
        let текущаяКатегория = "";
        
        // Для бойни
        let вБою = false;
        let раунд = 1;
        let победыИгрока = 0;
        let победыБота = 0;
        let примерДляБоя = "";
        let правильныйОтвет = 0;
        let таймерРаунда = null;
        let сложностьБоя = "легко";
        
        const слова = {
            "легковушка": ["жигули", "бэха", "приора", "тазик", "мерс", "жид"],
            "животные": ["заяц", "медведь", "лось", "кабан", "ёж", "белка", "енот"],
            "препятствия": ["столб", "забор", "яма", "камень", "дерево", "мужик с пивом"],
            "транспорт": ["трактор", "автобус", "фура", "пожарка", "скорая", "мент"]
        };

        // ========== НЕЦЕНЗУРНЫЕ ФРАЗЫ ==========
        const фразы = {
            "легковушка": {
                сбить: [
                    "💥 ХАХАХАХАХ, СЪЕБАЛАСЬ НИЩАЯ!",
                    "🚗💨 БЭХА УЛЕТЕЛА В ЗАБОР, ПИДОРАС!",
                    "😈 ЖИГУЛИ РАЗЪЕБАЛ В ХЛАМ!",
                    "🔥 ТАЗИК ТЕПЕРЬ МЕТАЛЛОЛОМ, ХУЙ СОСИ!",
                    "💀 МЕРС ОТДОХНУЛ, ДЕБИЛ ЕБАНЫЙ!"
                ],
                пощадить: [
                    "😇 Ладно, живи, тварь... в этот раз.",
                    "🤝 Сегодня ты добрый. Повезло, сука.",
                    "🕊️ Отпустил. Но в следующий раз — пизда.",
                    "👋 ВАЛИ, ПОКА Я ДОБРЫЙ!"
                ],
                объехать: [
                    "🏁 Объехал, красава!",
                    "🚀 Пролетел мимо, даже не заметил.",
                    "😎 Ловко, бля!"
                ]
            },
            "животные": {
                сбить: [
                    "💀 Заяц теперь не ужин, а хуй знает что.",
                    "🦌 Лось — труп, нахуй он нужен?",
                    "🐗 Кабану пизда, мясо в лес утащили.",
                    "🦔 Ёж размазался по асфальту, сука.",
                    "🐻 Медведь отъебался нахуй."
                ],
                пощадить: [
                    "🦊 Белка ускакала в лес, повезло, суке.",
                    "🐾 Ты добрый, животное выжило.",
                    "🌿 Экология рада, хули."
                ],
                объехать: [
                    "🏃 Заяц убежал, быстро съебал.",
                    "🌳 Зверь спасся, повезло ему.",
                    "🦔 Ёжик остался жив, хуй с ним."
                ]
            },
            "препятствия": {
                сбить: [
                    "🧱 Забор нахуй!",
                    "🚧 Столб — в щепки, пидор!",
                    "💢 Камень разлетелся, сука!",
                    "🪵 Дерево лежит, а ты едешь.",
                    "🍺 Мужик с пивом — в кювет, пидорас!"
                ],
                пощадить: [
                    "🙏 Обошёл, не стал ломать.",
                    "🛣️ Препятствие на месте, а ты молодец.",
                    "🤷 Сегодня без разрушений."
                ],
                объехать: [
                    "🏎️ Красивый объезд, бля!",
                    "🎯 Как Шумахер, сука!",
                    "🚘 Идеально, бля!"
                ]
            },
            "транспорт": {
                сбить: [
                    "🚌 АХАХАХАХА, ВЫ ЧЁ АХУЕЛИ, БАБКИ? ВРЕМЯ 6 УТРА, НАХУЙ!",
                    "🚛 ДАЛЬНОБОЙ ПЕРЕВЕРНУЛСЯ, ЛОГИСТИКА В ЖОПЕ, ПИДОРАС!",
                    "🚑 СКОРАЯ ТЕПЕРЬ НИКОМУ НЕ ПОМОЖЕТ, СУКА!",
                    "🚒 ПОЖАРКА ГОРИТ, ИРОНИЧНО, БЛЯ!",
                    "👮 МЕНТ В КЮВЕТЕ, ТЕПЕРЬ БЕЗ ПРОТОКОЛА!"
                ],
                пощадить: [
                    "👨‍⚕️ Скорая уехала бабку спасать.",
                    "👮 Мент козырнул, уважает, сука.",
                    "🚒 Пожарные помахали рукой."
                ],
                объехать: [
                    "🚚 Фуру объехал, красава!",
                    "🏎️ Автобус позади, ты летишь!",
                    "🚗 Перед трактором проскочил, бля!"
                ]
            }
        };

        // ========== СПЕЦИАЛЬНЫЕ ФРАЗЫ ДЛЯ РАЗНЫХ ПРЕДМЕТОВ ==========
        function специальнаяФраза(предмет, действие) {
            let низ = предмет.toLowerCase();
            if (действие === "сбить") {
                if (низ.includes("мент") || низ.includes("гаи") || низ.includes("дпс")) {
                    let варианты = [
                        "👮 МЕНТУ ПИЗДА! ТЕПЕРЬ ТЫ В РОЗЫСКЕ, БЛЯ!",
                        "🚓 ГАИШНИК УЛЕТЕЛ, ПРОТОКОЛ НАХУЙ!",
                        "💀 МЕНТОВОЗКА РАЗЪЕБАНА, ТЫ ГЕРОЙ!"
                    ];
                    return варианты[Math.floor(Math.random() * варианты.length)];
                }
                if (низ.includes("пожарк") || низ.includes("пожарн")) {
                    let варианты = [
                        "🚒 ПОЖАРКА ТЕПЕРЬ САМА ГОРИТ, СУКА!",
                        "🔥 ОГОНЬ ТУШИТЬ НЕКОМУ, МОЛОДЕЦ!"
                    ];
                    return варианты[Math.floor(Math.random() * варианты.length)];
                }
                if (низ.includes("скор") || низ.includes("мед")) {
                    let варианты = [
                        "🚑 СКОРАЯ НЕ ДОВЕЗЁТ, ПИДОРАС!",
                        "💊 ТЕПЕРЬ БЕЗ ПОМОЩИ, ХУЙ СОСИ!"
                    ];
                    return варианты[Math.floor(Math.random() * варианты.length)];
                }
                if (низ.includes("бабк") || низ.includes("дед")) {
                    let варианты = [
                        "🧓 БАБКУ ЖАЛКО, НО ПОХУЙ, ОНА СТАРАЯ!",
                        "👴 ДЕД УЛЕТЕЛ ВМЕСТЕ С ЯЙЦОМ!"
                    ];
                    return варианты[Math.floor(Math.random() * варианты.length)];
                }
            }
            return null;
        }

        // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ ФРАЗЫ ==========
        function получитьФразу(категория, действие, предмет) {
            // Сначала проверяем специальные фразы для конкретных предметов
            let спец = специальнаяФраза(предмет, действие);
            if (спец) return спец;
            
            // Потом общие фразы по категории
            if (фразы[категория] && фразы[категория][действие]) {
                let варианты = фразы[категория][действие];
                return варианты[Math.floor(Math.random() * варианты.length)];
            }
            return "Что-то пошло не так...";
        }

        // ========== ФУНКЦИИ ==========
        function обновитьСтатистику() {
            document.getElementById("жизни").innerText = жизни;
            document.getElementById("очки").innerText = очки;
            document.getElementById("подрезы").innerText = подрезы;
        }

        function добавитьТекст(текст) {
            let output = document.getElementById("output");
            output.innerHTML +=  текст + "<br>";
            output.scrollTop = output.scrollHeight;
        }

        function очиститьВывод() {
            document.getElementById("output").innerHTML = "";
        }

        function показатьМеню() {
            добавитьТекст("\n=================");
            добавитьТекст("🚗 Что делать?");
            добавитьТекст("1. 💥 СБИТЬ");
            добавитьТекст("2. 🤝 ПОЩАДИТЬ");
            добавитьТекст("3. ⚔️ БОЙНЯ (до 3 побед)");
            добавитьТекст("4. 📊 СТАТИСТИКА");
            состояние = "главное_меню";
        }

        function новаяВстреча() {
            let категории = Object.keys(слова);
            let категория = категории[Math.floor(Math.random() * категории.length)];
            let предмет = слова[категория][Math.floor(Math.random() * слова[категория].length)];
            текущийПредмет = предмет;
            текущаяКатегория = категория;
            
            добавитьТекст(`\n🚗 Ты едешь по трассе и видишь ${предмет} (${категория}).`);
            показатьМеню();
        }

        // ========== ГЕНЕРАЦИЯ ПРИМЕРОВ ==========
        function сгенерироватьПример(сложность) {
            let a, b, c, текст, правильный;
            
            if (сложность === "легко") {
                a = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                if (Math.random() > 0.5) {
                    текст = `${a} + ${b}`;
                    правильный = a + b;
                } else {
                    a = Math.max(a, b);
                    текст = `${a} - ${b}`;
                    правильный = a - b;
                }
            } else if (сложность === "средне") {
                a = Math.floor(Math.random() * 5) + 2;
                b = Math.floor(Math.random() * 5) + 2;
                текст = `${a} × ${b}`;
                правильный = a * b;
            } else {
                a = Math.floor(Math.random() * 5) + 3;
                b = Math.floor(Math.random() * 5) + 3;
                c = Math.floor(Math.random() * 2) + 2;
                текст = `(${a} + ${b}) × ${c}`;
                правильный = (a + b) * c;
            }
            return { текст, правильный };
        }

        // ========== ТАЙМЕР ДЛЯ БОЯ ==========
        function запуститьТаймерРаунда() {
            if (таймерРаунда) clearTimeout(таймерРаунда);
            
            таймерРаунда = setTimeout(() => {
                if (вБою) {
                    добавитьТекст("⏰ ВРЕМЯ ВЫШЛО! Раунд за ботом!");
                    победыБота++;
                    проверитьКонецБоя();
                }
            }, 15000); // 15 секунд на ответ
        }

        // ========== НОВЫЙ РАУНД В БОЮ ==========
        function новыйРаундБоя() {
            очиститьВывод();
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            добавитьТекст(`⚔️ РАУНД ${раунд} ⚔️`);
            добавитьТекст(`СЧЁТ: ТЫ ${победыИгрока} : ${победыБота} БОТ`);
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            
            // Определяем сложность по категории
            if (текущаяКатегория === "легковушка") сложностьБоя = "легко";
            else if (текущаяКатегория === "транспорт") сложностьБоя = "средне";
            else сложностьБоя = "сложно";
            
            let пример = сгенерироватьПример(сложностьБоя);
            примерДляБоя = пример.текст;
            правильныйОтвет = пример.правильный;
            
            добавитьТекст(`\n🧮 РЕШИ ПРИМЕР:`);
            добавитьТекст(`📌 ${примерДляБоя} = ?`);
            добавитьТекст(`⏳ 15 СЕКУНД!`);
            добавитьТекст(`\n👉 Введи ответ:`);
            
            состояние = "бой_раунд";
            запуститьТаймерРаунда();
        }

        // ========== ПРОВЕРКА КОНЦА БОЯ ==========
        function проверитьКонецБоя() {
            if (победыИгрока >= 3 || победыБота >= 3) {
                вБою = false;
                очиститьВывод();
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                if (победыИгрока >= 3) {
                    добавитьТекст("🎉 ТЫ ПОБЕДИЛ В БОЙНЕ!");
                    добавитьТекст("💥 Противник летит в забор!");
                    добавитьТекст("🏆 +10 очков, +3 подреза");
                    очки += 10;
                    подрезы += 3;
                } else {
                    добавитьТекст("💀 ТЫ ПРОИГРАЛ В БОЙНЕ!");
                    добавитьТекст("💔 -5 жизней");
                    жизни -= 5;
                }
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                добавитьТекст(`\n📊 ИТОГ: ${очки} очков, ${подрезы} подрезаний`);
                обновитьСтатистику();
                
                if (жизни > 0) {
                    setTimeout(новаяВстреча, 3000);
                } else {
                    добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                }
            } else {
                раунд++;
                setTimeout(новыйРаундБоя, 2000);
            }
        }

        // ========== ОСНОВНАЯ ФУНКЦИЯ ==========
        function обработатьВвод() {
            let input = document.getElementById("userInput").value.trim();
            document.getElementById("userInput").value = "";
            
            if (input === "") return;
            
            добавитьТекст("> " + input);
            
            if (состояние === "бой_раунд") {
                if (таймерРаунда) clearTimeout(таймерРаунда);
                
                let ответ = parseInt(input);
                if (ответ === правильныйОтвет) {
                    добавитьТекст("✅ Ты ответил правильно!");
                    победыИгрока++;
                } else {
                    добавитьТекст("❌ Неверно! Бот получает очко!");
                    победыБота++;
                }
                
                проверитьКонецБоя();
            }
            else if (состояние === "главное_меню") {
                switch(input) {
                    case "1":
                        let сложность = текущаяКатегория === "легковушка" ? "легко" : 
                                        текущаяКатегория === "транспорт" ? "средне" : "сложно";
                        let пример = сгенерироватьПример(сложность);
                        
                        добавитьТекст(`\n🧮 ${пример.текст} = ?`);
                        let ответ = prompt(пример.текст + " = ?");
                        
                        if (ответ === null) {
                            добавитьТекст("⏰ Ты не ответил!");
                            добавитьТекст("🚗💨 Тебя обогнали! -1 жизнь");
                            жизни--;
                        } else if (parseInt(ответ) === пример.правильный) {
                            добавитьТекст("✅ Верно!");
                            let фраза = получитьФразу(текущаяКатегория, "сбить", текущийПредмет);
                            добавитьТекст(`💥 ${фраза} +3 очка`);
                            очки += 3;
                            подрезы++;
                        } else {
                            добавитьТекст("❌ Ошибка!");
                            добавитьТекст(`🧱 Ты врезался! -2 жизни`);
                            жизни -= 2;
                        }
                        обновитьСтатистику();
                        setTimeout(новаяВстреча, 2000);
                        break;
                        
                    case "2":
                        let фразаПощада = получитьФразу(текущаяКатегория, "пощадить", текущийПредмет);
                        добавитьТекст(`\n😇 ${фразаПощада} +1 очко`);
                        очки++;
                        if (Math.random() > 0.7) {
                            добавитьТекст("🍀 Удача! +1 очко");
                            очки++;
                        }
                        обновитьСтатистику();
                        setTimeout(новаяВстреча, 2000);
                        break;
                        
                    case "3":
                        вБою = true;
                        победыИгрока = 0;
                        победыБота = 0;
                        раунд = 1;
                        новыйРаундБоя();
                        break;
                        
                    case "4":
                        добавитьТекст(`\n📊 СТАТИСТИКА:`);
                        добавитьТекст(`❤️ ЖИЗНИ: ${жизни}`);
                        добавитьТекст(`📊 ОЧКИ: ${очки}`);
                        добавитьТекст(`🔪 ПОДРЕЗАНО: ${подрезы}`);
                        setTimeout(показатьМеню, 2000);
                        break;
                        
                    default:
                        добавитьТекст("❌ Неправильный выбор");
                        setTimeout(показатьМеню, 1000);
                }
            }
            
            if (жизни <= 0) {
                добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                добавитьТекст(`ИТОГО: ${очки} очков, ${подрезы} подрезаний`);
                добавитьТекст("🕊️ ПТДАДТА ВЕЧНА 🕊️");
            }
            
            обновитьСтатистику();
        }

        // ========== СТАРТ ==========
        window.onload = function() {
            новаяВстреча();
        };
    </script>
</body>
</html>
