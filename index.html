<!DOCTYPE html>
<html>
<head>
    <title>⚔️ ПТДАДТА-БОЙНЯ ⚔️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(45deg, #000, #1a0033); 
            color: white; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            font-size: 18px;
        }
        .консоль {
            background: rgba(0,0,0,0.8);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 4em;
            text-shadow: 0 0 20px gold;
            margin-bottom: 30px;
        }
        #output {
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 30px;
            min-height: 400px;
            font-size: 24px;
            margin-bottom: 30px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            line-height: 1.5;
        }
        .input-area {
            display: flex;
            gap: 20px;
        }
        #userInput {
            flex: 1;
            padding: 20px;
            font-size: 24px;
            background: #222;
            color: white;
            border: 2px solid gold;
            border-radius: 10px;
        }
        button {
            padding: 20px 40px;
            font-size: 24px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        .статистика {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #222;
            border-radius: 10px;
        }
        .стат-блок {
            text-align: center;
        }
        .значение {
            font-size: 3em;
            color: gold;
        }
        .стат-блок div:last-child {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="консоль">
        <h1>⚔️ ПТДАДТА-БОЙНЯ ⚔️</h1>
        
        <div class="статистика">
            <div class="стат-блок">
                <div class="значение" id="жизни">5</div>
                <div>❤️ ЖИЗНИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="очки">0</div>
                <div>📊 ОЧКИ</div>
            </div>
            <div class="стат-блок">
                <div class="значение" id="подрезы">0</div>
                <div>🔪 ПОДРЕЗАНО</div>
            </div>
        </div>

        <div id="output">🚛 ПТДАДТА-ТРАССА: ВЫБЕРИ СВОЁ ПРИКЛЮЧЕНИЕ 🚛</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твой выбор..." autofocus>
            <button onclick="обработатьВвод()">➡️ ВВОД</button>
        </div>
    </div>

    <script>
        let очки = 0;
        let жизни = 5;
        let подрезы = 0;
        let состояние = "главное_меню";
        let текущийПредмет = "";
        let текущаяКатегория = "";
        let вБою = false;
        let раунд = 1;
        let победыИгрока = 0;
        let победыБота = 0;
        let примерДляБоя = "";
        let правильныйОтвет = 0;
        let таймерРаунда = null;
        let сложностьБоя = "легко";

        const слова = {
            "легковушка": ["жигули", "бэха", "приора", "тазик", "мерс", "жид"],
            "животные": ["заяц", "медведь", "лось", "кабан", "ёж", "белка", "енот"],
            "препятствия": ["столб", "забор", "яма", "камень", "дерево", "мужик с пивом"],
            "транспорт": ["трактор", "автобус", "фура", "пожарка", "скорая", "мент"],
            "бомжи": ["бомж с вокзала", "бомжиха с тележкой", "бомж-алкоголик", "бомж с собакой", "бомж-философ"],
            "алкаши": ["алкаш с пузырём", "алкаш под забором", "пьяный сантехник", "алкаш в 6 утра", "дворник-алкоголик"],
            "зинаиды": ["зинаида с ключами", "зинаида-вахтёрша", "зинаида-училка", "зинаида-соседка", "зинаида-продавщица"],
            "деды": ["дед с яйцом", "дед с клюшкой", "дед на лавочке", "дед-ветеран", "дед с газетой"],
            "бабки": ["бабка с авоськой", "бабка с семечками", "бабка-сплетница", "бабка на лавочке", "бабка-ведьма"],
            "гопники": ["гопник с района", "гопник с семками", "гопник с битой", "гопник на корточках", "гопник в спортиках"],
            "таджики": ["таджик с метлой", "таджик-строитель", "таджик с шаурмой", "таджик на рынке", "таджик-мигрант"],
            "чиновники": ["чиновник с портфелем", "депутат на мерсе", "мэр города", "депутат с деньгами", "политик-взяточник"],
            "пассажиры": ["бабка с билетом", "заяц в автобусе", "кондукторша злая", "пассажир с перегаром", "мамаша с коляской"],
            "маршрутчики": ["маршрутчик-лихач", "маршрутчик-хам", "маршрутчик с деньгами", "маршрутчик без тормозов"],
            "пешеходы": ["пешеход с телефоном", "пешеход на красный", "пешеход с наушниками", "пешеход-зебра", "пешеход-пьяный"],
            "мутанты": ["трёхглазый заяц", "радиоактивный ёж", "лось с рентгеном", "кабан с крыльями", "мутант из зоны"]
        };

        const фразы = {
            "легковушка": {
                сбить: ["💥 ХАХАХАХАХ, СЪЕБАЛАСЬ НИЩАЯ!", "🚗💨 БЭХА УЛЕТЕЛА В ЗАБОР, ПИДОРАС!", "😈 ЖИГУЛИ РАЗЪЕБАЛ В ХЛАМ!"],
                пощадить: ["😇 Ладно, живи, тварь...", "🤝 Сегодня ты добрый.", "🕊️ Отпустил."],
                объехать: ["🏁 Объехал, красава!", "🚀 Пролетел мимо."]
            },
            "животные": {
                сбить: ["💀 Заяц теперь не ужин, а хуй знает что.", "🦌 Лось — труп, нахуй он нужен?", "🦔 Ёж размазался по асфальту, сука."],
                пощадить: ["🦊 Белка ускакала в лес, повезло, суке.", "🐾 Ты добрый, животное выжило."],
                объехать: ["🏃 Заяц убежал, быстро съебал.", "🦔 Ёжик остался жив, хуй с ним."]
            },
            "препятствия": {
                сбить: ["🧱 Забор нахуй!", "🚧 Столб — в щепки, пидор!", "💢 Камень разлетелся, сука!"],
                пощадить: ["🙏 Обошёл, не стал ломать.", "🛣️ Препятствие на месте, а ты молодец."],
                объехать: ["🏎️ Красивый объезд, бля!", "🎯 Как Шумахер, сука!"]
            },
            "транспорт": {
                сбить: ["🚌 АХАХАХАХА, ВЫ ЧЁ АХУЕЛИ, БАБКИ? ВРЕМЯ 6 УТРА, НАХУЙ!", "🚛 ДАЛЬНОБОЙ ПЕРЕВЕРНУЛСЯ!", "👮 МЕНТ В КЮВЕТЕ!"],
                пощадить: ["👨‍⚕️ Скорая уехала.", "👮 Мент козырнул."],
                объехать: ["🚚 Фуру объехал!", "🏎️ Автобус позади!"]
            }
        };

        function обновитьСтатистику() {
            document.getElementById("жизни").innerText = жизни;
            document.getElementById("очки").innerText = очки;
            document.getElementById("подрезы").innerText = подрезы;
        }

        function добавитьТекст(текст) {
            let output = document.getElementById("output");
            output.innerHTML += "<br>" + текст;
            output.scrollTop = output.scrollHeight;
        }

        function очиститьВывод() {
            document.getElementById("output").innerHTML = "";
        }

        function показатьМеню() {
            добавитьТекст("\n=================");
            добавитьТекст("🚗 Что делать?");
            добавитьТекст("1. 💥 СБИТЬ");
            добавитьТекст("2. 🤝 ПОЩАДИТЬ");
            добавитьТекст("3. ⚔️ БОЙНЯ");
            добавитьТекст("4. 📊 СТАТИСТИКА");
            состояние = "главное_меню";
        }

        function новаяВстреча() {
            let категории = Object.keys(слова);
            let категория = категории[Math.floor(Math.random() * категории.length)];
            let предмет = слова[категория][Math.floor(Math.random() * слова[категория].length)];
            текущийПредмет = предмет;
            текущаяКатегория = категория;
            
            добавитьТекст(`\n🚗 Ты едешь по трассе и видишь ${предмет} (${категория}).`);
            показатьМеню();
        }

        function получитьФразу(категория, действие) {
            if (фразы[категория] && фразы[категория][действие]) {
                let варианты = фразы[категория][действие];
                return варианты[Math.floor(Math.random() * варианты.length)];
            }
            if (действие === "сбить") return "💥 ХУЙНЯ СБИТА!";
            if (действие === "пощадить") return "😇 ПОМИЛОВАН!";
            return "🏁 ОБЪЕХАЛ!";
        }

        function сгенерироватьПример(сложность) {
            let a, b, c, текст, правильный;
            if (сложность === "легко") {
                a = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                if (Math.random() > 0.5) {
                    текст = `${a} + ${b}`;
                    правильный = a + b;
                } else {
                    a = Math.max(a, b);
                    текст = `${a} - ${b}`;
                    правильный = a - b;
                }
            } else if (сложность === "средне") {
                a = Math.floor(Math.random() * 5) + 2;
                b = Math.floor(Math.random() * 5) + 2;
                текст = `${a} × ${b}`;
                правильный = a * b;
            } else {
                a = Math.floor(Math.random() * 5) + 3;
                b = Math.floor(Math.random() * 5) + 3;
                c = Math.floor(Math.random() * 2) + 2;
                текст = `(${a} + ${b}) × ${c}`;
                правильный = (a + b) * c;
            }
            return { текст, правильный };
        }

        function запуститьТаймерРаунда() {
            if (таймерРаунда) clearTimeout(таймерРаунда);
            таймерРаунда = setTimeout(() => {
                if (вБою) {
                    добавитьТекст("⏰ ВРЕМЯ ВЫШЛО! Раунд за ботом!");
                    победыБота++;
                    проверитьКонецБоя();
                }
            }, 15000);
        }

        function новыйРаундБоя() {
            очиститьВывод();
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            добавитьТекст(`⚔️ РАУНД ${раунд} ⚔️`);
            добавитьТекст(`СЧЁТ: ТЫ ${победыИгрока} : ${победыБота} БОТ`);
            добавитьТекст("⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️⚔️");
            
            if (текущаяКатегория === "легковушка") сложностьБоя = "легко";
            else if (текущаяКатегория === "транспорт") сложностьБоя = "средне";
            else сложностьБоя = "сложно";
            
            let пример = сгенерироватьПример(сложностьБоя);
            примерДляБоя = пример.текст;
            правильныйОтвет = пример.правильный;
            
            добавитьТекст(`\n🧮 РЕШИ ПРИМЕР:`);
            добавитьТекст(`📌 ${примерДляБоя} = ?`);
            добавитьТекст(`⏳ 15 СЕКУНД!`);
            добавитьТекст(`\n👉 Введи ответ:`);
            
            состояние = "бой_раунд";
            запуститьТаймерРаунда();
        }

        function проверитьКонецБоя() {
            if (победыИгрока >= 3 || победыБота >= 3) {
                вБою = false;
                очиститьВывод();
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                if (победыИгрока >= 3) {
                    добавитьТекст("🎉 ТЫ ПОБЕДИЛ В БОЙНЕ!");
                    добавитьТекст("💥 Противник летит в забор!");
                    добавитьТекст("🏆 +10 очков, +3 подреза");
                    очки += 10;
                    подрезы += 3;
                } else {
                    добавитьТекст("💀 ТЫ ПРОИГРАЛ В БОЙНЕ!");
                    добавитьТекст("💔 -5 жизней");
                    жизни -= 5;
                }
                добавитьТекст("🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆");
                добавитьТекст(`\n📊 ИТОГ: ${очки} очков, ${подрезы} подрезаний`);
                обновитьСтатистику();
                
                if (жизни > 0) {
                    setTimeout(новаяВстреча, 3000);
                } else {
                    добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                }
            } else {
                раунд++;
                setTimeout(новыйРаундБоя, 2000);
            }
        }

        function обработатьВвод() {
            let input = document.getElementById("userInput").value.trim();
            document.getElementById("userInput").value = "";
            
            if (input === "") return;
            
            добавитьТекст("> " + input);
            
            if (состояние === "бой_раунд") {
                if (таймерРаунда) clearTimeout(таймерРаунда);
                
                let ответ = parseInt(input);
                if (ответ === правильныйОтвет) {
                    добавитьТекст("✅ Ты ответил правильно!");
                    победыИгрока++;
                } else {
                    добавитьТекст("❌ Неверно! Бот получает очко!");
                    победыБота++;
                }
                проверитьКонецБоя();
            }
            else if (состояние === "главное_меню") {
                switch(input) {
                    case "1":
                        let сложность = текущаяКатегория === "легковушка" ? "легко" : 
                                        текущаяКатегория === "транспорт" ? "средне" : "сложно";
                        let пример = сгенерироватьПример(сложность);
                        
                        добавитьТекст(`\n🧮 ${пример.текст} = ?`);
                        let ответ = prompt(пример.текст + " = ?");
                        
                        if (ответ === null) {
                            добавитьТекст("⏰ Ты не ответил!");
                            добавитьТекст("🚗💨 Тебя обогнали! -1 жизнь");
                            жизни--;
                        } else if (parseInt(ответ) === пример.правильный) {
                            добавитьТекст("✅ Верно!");
                            let фраза = получитьФразу(текущаяКатегория, "сбить");
                            добавитьТекст(`💥 ${фраза} +3 очка`);
                            очки += 3;
                            подрезы++;
                        } else {
                            добавитьТекст("❌ Ошибка!");
                            добавитьТекст(`🧱 Ты врезался! -2 жизни`);
                            жизни -= 2;
                        }
                        обновитьСтатистику();
                        setTimeout(новаяВстреча, 2000);
                        break;
                        
                    case "2":
                        let фразаПощада = получитьФразу(текущаяКатегория, "пощадить");
                        добавитьТекст(`\n😇 ${фразаПощада} +1 очко`);
                        очки++;
                        if (Math.random() > 0.7) {
                            добавитьТекст("🍀 Удача! +1 очко");
                            очки++;
                        }
                        обновитьСтатистику();
                        setTimeout(новаяВстреча, 2000);
                        break;
                        
                    case "3":
                        вБою = true;
                        победыИгрока = 0;
                        победыБота = 0;
                        раунд = 1;
                        новыйРаундБоя();
                        break;
                        
                    case "4":
                        добавитьТекст(`\n📊 СТАТИСТИКА:`);
                        добавитьТекст(`❤️ ЖИЗНИ: ${жизни}`);
                        добавитьТекст(`📊 ОЧКИ: ${очки}`);
                        добавитьТекст(`🔪 ПОДРЕЗАНО: ${подрезы}`);
                        setTimeout(показатьМеню, 2000);
                        break;
                        
                    default:
                        добавитьТекст("❌ Неправильный выбор");
                        setTimeout(показатьМеню, 1000);
                }
            }
            
            if (жизни <= 0) {
                добавитьТекст("\n💀💀💀 ТЫ УМЕР 💀💀💀");
                добавитьТекст(`ИТОГО: ${очки} очков, ${подрезы} подрезаний`);
                добавитьТекст("🕊️ ПТДАДТА ВЕЧНА 🕊️");
            }
            
            обновитьСтатистику();
        }

        window.onload = function() {
            новаяВстреча();
        };
    </script>
</body>
</html>
